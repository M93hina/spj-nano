<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>B1F フリースペース 混雑状況</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="viz-root wrap">
    <h1>B1F フリースペース 混雑状況</h1>
    <p class="subtitle">CO2濃度から混雑度を推定しています。5分ごとに自動更新されます。</p>

    <div id="empty-state" class="card empty-state hidden">
      まだ表示できるデータがありません。しばらくしてから再読み込みしてください。
    </div>

    <div id="dashboard-body" class="hidden">
      <div id="warning-banner" class="warning-banner">
        <span class="icon">⚠</span>
        <span id="warning-text"></span>
      </div>

      <!-- 現在の状況 -->
      <section class="card hero">
        <div class="hero-main">
          <span class="badge" id="hero-level">–</span>
          <span class="hero-co2"><span id="hero-co2-value">–</span><span class="unit">ppm</span></span>
        </div>
        <div class="hero-meta">
          <span class="forecast-chip hidden" id="hero-forecast">
            1時間後の見込み
            <span class="mini-badge" id="hero-forecast-badge">–</span>
          </span>
          <span id="hero-updated">–</span>
        </div>
      </section>

      <!-- 混雑の推移(実測)と予測 -->
      <section class="card">
        <div class="chart-header">
          <h2>混雑の推移と予測</h2>
          <div class="range-toggle" id="range-toggle" role="group" aria-label="表示範囲の切替">
            <button type="button" class="active" data-hours="6">6時間</button>
            <button type="button" data-hours="24">24時間</button>
          </div>
        </div>
        <div class="chart-wrap">
          <canvas id="chart-24h"></canvas>
        </div>
        <div class="chart-note" id="chart-note"></div>
      </section>

      <!-- 曜日×時間帯の傾向 -->
      <section class="card">
        <h2>曜日・時間帯ごとの混雑傾向</h2>
        <div class="heatmap-outer">
          <div class="heatmap-scroll">
            <table class="heatmap" id="heatmap-table"></table>
          </div>
        </div>
        <div class="heatmap-hint">→ 表は横にスクロールできます</div>
        <div class="chart-note">数値は各時間帯の平均CO2濃度（ppm）。色が濃いほど混雑しやすい傾向です。</div>
      </section>

      <!-- 算出根拠などの内部情報(利用者には通常不要なので折りたたむ) -->
      <details class="card about">
        <summary>データについて</summary>
        <ul>
          <li class="level-scale" id="about-levels"></li>
          <li id="about-basis"></li>
          <li id="about-spikes"></li>
          <li id="about-forecast"></li>
        </ul>
      </details>

      <footer class="updated-at" id="fetched-at"></footer>
    </div>
  </div>

  <script src="/static/chart.umd.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
